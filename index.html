    <!-- Google Analytics & AdSense - aggressively deferred to reduce unused JS -->
    <script>
      (function() {
        var gaLoaded = false, adLoaded = false;
        function loadGA() {
          if (gaLoaded) return;
          gaLoaded = true;
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-M0VE8D3XLZ';
          s.async = true;
          document.head.appendChild(s);
          s.onload = function() {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-M0VE8D3XLZ', { page_path: location.pathname, send_page_view: true });
          };
        }
        function loadAds() {
          if (adLoaded) return;
          adLoaded = true;
          var s = document.createElement('script');
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1375386376692976';
          s.async = true;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }
        // Load GA on first user interaction or after 8s, whichever comes first
        var events = ['scroll','click','touchstart','keydown'];
        function onInteract() {
          loadGA();
          // Load ads 2s after first interaction
          setTimeout(loadAds, 2000);
          events.forEach(function(e){ removeEventListener(e, onInteract, {passive:true,capture:true}); });
        }
        events.forEach(function(e){ addEventListener(e, onInteract, {passive:true,capture:true}); });
        // Fallback: load GA after 8s, ads after 12s if no interaction
        addEventListener('load', function() {
          setTimeout(loadGA, 8000);
          setTimeout(loadAds, 12000);
        });
      })();
    </script>
